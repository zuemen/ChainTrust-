server {
  listen 80;
  server_name _;

  # /api/* 轉發到 issuer-verifier（去掉 /api 前綴，與 vite proxy 行為一致）
  location /api/ {
    proxy_pass http://issuer-verifier:3001/;
    proxy_set_header Host $host;
  }

  # SPA 靜態檔
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
